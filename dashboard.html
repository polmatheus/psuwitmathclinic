<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบหลังบ้าน - คลินิกคณิตศาสตร์</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .table-container { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
  </style>
</head>

<body class="antialiased text-slate-800 p-4 md:p-8">

  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
      <div class="flex items-center gap-4">
        <div class="bg-blue-600 p-3 rounded-xl shadow-md text-white">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        </div>
        <div>
          <h1 class="text-2xl font-extrabold text-slate-800">Teacher Dashboard</h1>
          <p class="text-slate-500 text-sm">ระบบติดตามการทำแบบฝึกหัด คลินิกคณิตศาสตร์</p>
        </div>
      </div>

      <div class="flex flex-col md:flex-row gap-3 w-full md:w-auto">
        <div class="relative w-full md:w-64">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </div>
          <input type="text" id="search-input" class="w-full pl-10 pr-4 py-3 border border-slate-300 rounded-xl bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium" placeholder="กรอกรหัสนักเรียน...">
        </div>
        <button id="btn-refresh" class="px-5 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl flex items-center justify-center gap-2 transition-colors border border-slate-300">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> โหลดใหม่
        </button>
      </div>
    </div>

    <div id="loading-state" class="flex flex-col items-center justify-center py-20 bg-white rounded-2xl border border-slate-200 shadow-sm">
      <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600 mb-4"></div>
      <p class="text-slate-500 font-medium">กำลังดึงข้อมูลจากฐานข้อมูล...</p>
    </div>

    <div id="table-wrapper" class="hidden table-container bg-white border border-slate-200 rounded-2xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-200 text-sm">
          <thead class="bg-slate-800 text-white">
            <tr>
              <th scope="col" class="px-6 py-4 text-left font-bold tracking-wider w-1/4">ข้อมูลนักเรียน</th>
              <th scope="col" class="px-6 py-4 text-center font-bold tracking-wider w-2/4">ภาพรวม 10 ตอน (เลขลายน้ำคือจำนวนครั้งที่ทำ)</th>
              <th scope="col" class="px-6 py-4 text-left font-bold tracking-wider w-1/4">ประวัติการทำละเอียด</th>
            </tr>
          </thead>
          <tbody id="table-body" class="bg-white divide-y divide-slate-200">
            </tbody>
        </table>
      </div>
      <div id="no-data-msg" class="hidden text-center py-10 text-slate-500 font-medium bg-slate-50">
        ไม่พบข้อมูลนักเรียนที่ค้นหา
      </div>
    </div>

  </div>

  <script>
    // ----------------------------------------------------------------------
    // ⚠️ ตั้งค่า Supabase ตรงนี้
    // ----------------------------------------------------------------------
    const SUPABASE_URL = 'https://vcxneoclwtbiiyjsyhve.supabase.co'; // เช่น 'https://vcxneoclwtbiiyjsyhve.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_UUUwDKz-aB2YKoOKkxz9ZQ_tSI_7LEu'; 

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    // ----------------------------------------------------------------------

    let allRecords = [];
    let studentsInfo = {};
    let groupedData = {};

    document.addEventListener("DOMContentLoaded", () => {
      fetchData();
      
      // ค้นหาแบบ Real-time เมื่อพิมพ์รหัส
      document.getElementById('search-input').addEventListener('input', (e) => {
        renderTable(e.target.value.trim());
      });

      document.getElementById('btn-refresh').addEventListener('click', () => {
        document.getElementById('search-input').value = '';
        fetchData();
      });
    });

    async function fetchData() {
      document.getElementById('loading-state').classList.remove('hidden');
      document.getElementById('table-wrapper').classList.add('hidden');

      try {
        // ดึงชื่อนักเรียน
        const { data: students, error: err1 } = await supabaseClient.from('students').select('*');
        if (err1) throw err1;
        studentsInfo = {};
        students.forEach(s => { studentsInfo[s.student_id] = s; });

        // ดึงประวัติทั้งหมด เรียงจากเก่าไปใหม่เพื่อรัน "ครั้งที่..."
        const { data: records, error: err2 } = await supabaseClient
          .from('math_clinic_records')
          .select('*')
          .order('created_at', { ascending: true });
        
        if (err2) throw err2;
        allRecords = records;

        // ประมวลผลจัดกลุ่มข้อมูลล่วงหน้า
        processGroupedData();
        
        // แสดงตารางทั้งหมดตอนเริ่มต้น
        renderTable('');

      } catch (error) {
        alert("เกิดข้อผิดพลาดในการดึงข้อมูล: " + error.message);
      } finally {
        document.getElementById('loading-state').classList.add('hidden');
        document.getElementById('table-wrapper').classList.remove('hidden');
      }
    }

    function processGroupedData() {
      groupedData = {};
      allRecords.forEach(record => {
        const sId = String(record.student_id);
        
        if (!groupedData[sId]) {
          groupedData[sId] = {
            student_id: sId,
            name: studentsInfo[sId] ? studentsInfo[sId].name : record.name,
            class_num: studentsInfo[sId] ? studentsInfo[sId].class_number : record.class_number,
            student_num: studentsInfo[sId] ? studentsInfo[sId].student_number : record.student_number,
            history: [],
            summary: {}
          };
          for(let i=1; i<=10; i++) {
            groupedData[sId].summary[i] = { count: 0, status: 'NONE' };
          }
        }

        const g = groupedData[sId];
        const attemptNumber = g.history.length + 1;
        
        // แปลงสถานะให้เป็นคำสั้นๆ
        let shortStatus = record.is_correct;
        if(record.is_correct === 'ถูกต้อง') shortStatus = 'ถูก';
        else if(record.is_correct === 'รอตรวจ') shortStatus = 'รอตรวจ';
        else if(record.is_correct === 'ผิด') shortStatus = 'ผิด';
        else if(record.is_correct === 'กำลังเรียน') shortStatus = 'ยังไม่ส่ง';

        g.history.push({
          attemptNum: attemptNumber,
          section: record.section,
          status: shortStatus,
          full_status: record.is_correct
        });

        const sec = record.section;
        g.summary[sec].count += 1; 
        
        // ถ้าเคยถูกแล้ว จะไม่เปลี่ยนเป็นผิดอีก
        if (g.summary[sec].status !== 'CORRECT') {
          if (record.is_correct === 'ถูกต้อง') g.summary[sec].status = 'CORRECT';
          else if (record.is_correct === 'รอตรวจ') g.summary[sec].status = 'PENDING';
          else if (record.is_correct === 'ผิด') g.summary[sec].status = 'WRONG';
          else if (record.is_correct === 'กำลังเรียน') g.summary[sec].status = 'LEARNING';
        }
      });
    }

    function renderTable(searchTerm) {
      const tbody = document.getElementById('table-body');
      const noDataMsg = document.getElementById('no-data-msg');
      tbody.innerHTML = '';
      let hasData = false;

      // เรียงลำดับนักเรียนตามห้องและเลขที่
      const sortedStudents = Object.values(groupedData).sort((a, b) => {
        if (a.class_num !== b.class_num) return a.class_num - b.class_num;
        return a.student_num - b.student_num;
      });

      sortedStudents.forEach(data => {
        // กรองการค้นหาจากรหัสนักเรียน (ถ้ามี)
        if (searchTerm && !data.student_id.includes(searchTerm)) return;
        hasData = true;

        // ---------------- สร้างกล่อง 10 ตอน ----------------
        let summaryHtml = `<div class="grid grid-cols-5 gap-2 max-w-xs mx-auto">`;
        for (let i = 1; i <= 10; i++) {
          const sum = data.summary[i];
          let bgClass = 'bg-slate-100 border-slate-200 text-slate-400'; // ยังไม่ทำ
          let opacityText = 'text-slate-300';

          if (sum.status === 'CORRECT') {
            bgClass = 'bg-green-500 border-green-600 text-white shadow-sm';
            opacityText = 'text-green-800/30';
          } else if (sum.status === 'WRONG') {
            bgClass = 'bg-red-500 border-red-600 text-white shadow-sm';
            opacityText = 'text-red-900/30';
          } else if (sum.status === 'PENDING') {
            bgClass = 'bg-blue-500 border-blue-600 text-white shadow-sm';
            opacityText = 'text-blue-900/30';
          } else if (sum.status === 'LEARNING') {
            bgClass = 'bg-amber-100 border-amber-300 text-amber-700';
            opacityText = 'text-amber-600/20';
          }

          summaryHtml += `
            <div class="relative w-12 h-12 flex items-center justify-center rounded-lg border-2 ${bgClass} overflow-hidden">
              <span class="relative z-10 font-bold text-sm">ต.${i}</span>
              ${sum.count > 0 ? `<span class="absolute inset-0 flex items-center justify-center text-4xl font-black ${opacityText} pointer-events-none select-none">${sum.count}</span>` : ''}
            </div>
          `;
        }
        summaryHtml += `</div>`;

        // ---------------- สร้างรายการประวัติ (ครั้งที่ X: ตอนที่ Y ถูก/ผิด) ----------------
        let historyHtml = `<ul class="space-y-1 max-h-32 overflow-y-auto pr-2">`;
        data.history.forEach(h => {
          let color = 'text-slate-600';
          if(h.status === 'ถูก') color = 'text-green-600 font-bold';
          else if(h.status === 'ผิด') color = 'text-red-500 font-bold';
          else if(h.status === 'รอตรวจ') color = 'text-blue-500 font-bold';

          historyHtml += `<li class="border-b border-slate-100 pb-1 mb-1 text-xs">ครั้ง ${h.attemptNum} : ตอนที่ ${h.section} <span class="${color}">${h.status}</span></li>`;
        });
        historyHtml += `</ul>`;

        // ---------------- สร้างแถวตาราง ----------------
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50 transition-colors";
        tr.innerHTML = `
          <td class="px-6 py-4 whitespace-nowrap">
            <div class="flex flex-col">
              <span class="text-xs font-bold text-blue-600 mb-1">รหัส: ${data.student_id}</span>
              <span class="text-base font-bold text-slate-800">${data.name}</span>
              <span class="text-sm text-slate-500 mt-1">ม.${data.class_num} เลขที่ ${data.student_num}</span>
            </div>
          </td>
          <td class="px-6 py-4">
            ${summaryHtml}
          </td>
          <td class="px-6 py-4 bg-slate-50">
            ${historyHtml}
          </td>
        `;
        tbody.appendChild(tr);
      });

      if (!hasData) {
        noDataMsg.classList.remove('hidden');
        document.querySelector('table').classList.add('hidden');
      } else {
        noDataMsg.classList.add('hidden');
        document.querySelector('table').classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
